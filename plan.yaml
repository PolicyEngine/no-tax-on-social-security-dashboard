# Dashboard Implementation Plan
# Generated by dashboard-planner agent

dashboard:
  name: "no-tax-on-social-security-dashboard"
  title: "No tax on Social Security: analyzing HR 904"
  description: >
    An in-depth analysis of HR 904, which would eliminate federal income
    taxation of Social Security benefits by zeroing out the taxability rates
    in IRC 86. The dashboard shows the reform's budgetary cost, its effect on
    poverty (overall and among seniors), the distribution of household income
    changes across income deciles, and the share of winners and losers by
    decile. Aimed at policymakers and the general public.
  country: us
  audience: public
  # Country-scoped tool; kebab portion matches the repo name.
  zone_path: "/us/no-tax-on-social-security-dashboard"

# Precomputed JSON. The reform has a single fixed definition (no user-varied
# parameters), so the entire result set is a finite, one-time computation.
# CRITICAL: the precompute script must NOT run a local policyengine-us
# microsimulation (16GB CI runners OOM-kill national microsim). Instead it
# calls the PolicyEngine v1 API server-side compute — the same economy compute
# that powers policyengine.org — and caches the JSON response into the repo.
data_pattern: precomputed

precomputed:
  source_script: "scripts/precompute.py"
  output_files:
    - "public/data/impact.json"
  # How the script obtains data (server-side API compute, never local microsim):
  compute_source: policyengine-api-v1
  api_base: "https://api.policyengine.org"
  reform_dict_file: "reform.json"  # canonical reform copied from /tmp/reform.json
  steps:
    # 1. Create the reform policy and capture its policy id.
    - "POST {api_base}/us/policy  body={ data: <reform.json> }  -> reform_policy_id"
    # 2. Baseline is current-law US policy id 2 (the API's default baseline).
    - "baseline_policy_id = 2"
    # 3. Fetch society-wide impact. Poll until status == 'ok' (server-side microsim).
    - "GET {api_base}/us/economy/{reform_policy_id}/over/{baseline_policy_id}?region=us&time_period=2026&dataset=enhanced_cps -> result"
    # 4. Extract only the metrics the API provides (see below) and write impact.json.
  # Keys extracted from the economy `result` object into impact.json:
  extracted_metrics:
    budget:
      - budgetary_impact          # total federal revenue change (the cost)
      - tax_revenue_impact
      - baseline_net_income
    decile:
      - relative                  # relative net-income change by income decile (1-10)
      - average                   # average $ net-income change by income decile (1-10)
    poverty:
      - poverty.all               # SPM poverty rate baseline vs reform (all people)
      - poverty.senior            # SPM poverty rate baseline vs reform (aged 65+)
      - poverty.child
      - poverty.adult
    intra_decile:
      - all                       # aggregate winner/loser shares
      - deciles                   # winner/loser shares per income decile (10 arrays)
  time_period: 2026
  # NOTE: budgetary_impact from the economy endpoint is a single-year (2026)
  # figure. A 10-year total is NOT available from this endpoint and is dropped
  # (see "Questions or concerns" in the summary). Do not compute it locally.

tech_stack:
  framework: react-nextjs
  ui: "@policyengine/ui-kit"
  styling: tailwind-with-design-tokens
  font: inter
  testing: vitest
  charts: recharts

components:
  # --- Headline metric cards -------------------------------------------------
  - type: metric_card
    id: budgetary-cost
    title: "Annual federal cost (2026)"
    value_variable: budget.budgetary_impact
    format: currency
    note: "Reduction in federal revenue; displayed as a positive cost magnitude."

  - type: metric_card
    id: poverty-change-all
    title: "Change in overall poverty rate"
    value_variable: poverty.all  # (reform - baseline) / baseline
    format: percent
    invert_delta: true  # a decrease in poverty is the favorable direction

  - type: metric_card
    id: poverty-change-senior
    title: "Change in senior poverty rate"
    value_variable: poverty.senior
    format: percent
    invert_delta: true

  # --- Charts ----------------------------------------------------------------
  - type: chart
    id: winners-losers-by-decile
    chart_type: stacked_bar
    component_ref: "app-v2:ChartContainer"
    title: "Winners and losers by income decile"
    x:
      variable: income_decile
      label: "Income decile"
      format: number
    y:
      - variable: gain_more_than_5pct
        label: "Gain more than 5%"
        color: chart-1
      - variable: gain_less_than_5pct
        label: "Gain less than 5%"
        color: chart-2
      - variable: no_change
        label: "No change"
        color: border
      - variable: lose_less_than_5pct
        label: "Lose less than 5%"
        color: chart-5
      - variable: lose_more_than_5pct
        label: "Lose more than 5%"
        color: destructive
    source: intra_decile.deciles

  - type: chart
    id: avg-income-change-by-decile
    chart_type: bar
    component_ref: "app-v2:ChartContainer"
    title: "Average change in household income by income decile"
    x:
      variable: income_decile
      label: "Income decile"
      format: number
    y:
      - variable: average_change
        label: "Average change in net income"
        color: chart-1
        format: currency
    source: decile.average

  - type: chart
    id: poverty-by-age-group
    chart_type: grouped_bar
    component_ref: "app-v2:ChartContainer"
    title: "Poverty rate by age group, baseline vs reform"
    x:
      variable: age_group
      label: "Age group"  # child, adult, senior, all
    y:
      - variable: baseline_rate
        label: "Baseline"
        color: chart-5
        format: percent
      - variable: reform_rate
        label: "Under HR 904"
        color: chart-1
        format: percent
    source: poverty

embedding:
  register_in_apps_json: true
  display_with_research: true
  slug: "no-tax-on-social-security-dashboard"
  tags: ["us", "policy", "interactives", "social-security", "taxation"]

tests:
  api_tests:
    - name: "impact_json_shape"
      description: "precompute.py output has required top-level keys"
      input:
        file: "public/data/impact.json"
      expected_keys:
        - budget.budgetary_impact
        - decile.relative
        - decile.average
        - poverty.all
        - poverty.senior
        - intra_decile.deciles
    - name: "budgetary_cost_is_a_cost"
      description: "Eliminating SS taxation reduces federal revenue (negative impact)"
      input:
        field: budget.budgetary_impact
      expected:
        max: 0            # revenue falls
        min: -200000000000  # sanity bound: cost under ~$200B/yr for 2026
    - name: "poverty_does_not_increase"
      description: "Overall and senior poverty rates should not rise under the reform"
      input:
        fields: [poverty.all.reform, poverty.senior.reform]
      expected:
        senior_reform_le_baseline: true
        all_reform_le_baseline: true
    - name: "decile_arrays_length_10"
      description: "Decile and intra-decile breakdowns each cover 10 deciles"
      input:
        fields: [decile.average, intra_decile.deciles]
      expected:
        length: 10

  frontend_tests:
    - name: "renders_without_errors"
      description: "All metric cards and charts mount successfully from impact.json"
    - name: "charts_receive_data"
      description: "Each chart receives arrays of the expected length and shape"
    - name: "winners_losers_stack_to_100"
      description: "Each decile's winner/loser segments sum to ~100%"

  design_compliance:
    - name: "uses_design_tokens"
      description: "No hardcoded colors - all fills use var(--chart-*)/var(--destructive)/var(--border)"
    - name: "inter_font"
      description: "Inter font loaded via Google Fonts and applied via var(--font-sans)"
    - name: "sentence_case"
      description: "All headings and labels use sentence case"
    - name: "responsive"
      description: "Layout adapts at 768px and 480px breakpoints; charts shrink on mobile"
    - name: "nice_ticks"
      description: "All recharts axes use niceTicks=\"snap125\" with domain=[\"auto\",\"auto\"]"

  embedding_tests:
    - name: "country_detection"
      description: "Reads country from #country= hash parameter (defaults to us)"
    - name: "share_urls"
      description: "Share URLs point to policyengine.org, not the Vercel domain"
