# Dashboard Implementation Plan
# Generated by dashboard-planner agent
# REDESIGN: brings the existing single-page dashboard up to the current
# PolicyEngine dashboard spec (four standard pages: policy explanation,
# validation, impacts, household example).

dashboard:
  name: "no-tax-on-social-security-dashboard"
  title: "No tax on Social Security: analyzing HR 904"
  description: >
    An analysis of HR 904, which would eliminate federal income taxation of
    Social Security benefits by zeroing the five IRC 86 taxability rates
    effective 2026-01-01. The dashboard explains the reform provision-by-
    provision, documents how the numbers were produced and validated against
    external benchmarks, shows the reform's single-year (2026) budgetary cost,
    poverty effects (overall and among seniors), and distribution of household
    income changes across income deciles, and illustrates the effect on example
    senior households. Aimed at policymakers and the general public.
  country: us
  audience: public
  # Country-scoped tool; kebab portion matches the repo name.
  zone_path: "/us/no-tax-on-social-security-dashboard"

# Precomputed JSON. The reform has a single fixed definition (no user-varied
# reform parameters), so the entire result set is a finite, one-time computation
# performed at build time. This is the EXISTING pattern and is retained.
#
# CI COMPUTE CONSTRAINT (CRITICAL): the precompute script MUST NOT construct a
# local policyengine-us Microsimulation — a national microsim OOM-kills the
# 16GB CI runner (exit 143). All economy-wide numbers come from the hosted
# PolicyEngine v1 API server-side compute (the same compute that powers
# policyengine.org). Household-example numbers use the API's fast /household
# endpoint (household-level, NOT microsimulation — does not OOM). The live
# calibration API is queried at build time for the data-calibration section.
data_pattern: precomputed

precomputed:
  source_script: "scripts/precompute.py"
  output_files:
    - "public/data/impact.json"        # economy-wide reform impact (exists)
    - "public/data/parameters.json"    # policy-explanation parameter table
    - "public/data/validation.json"    # benchmarks, versions, calibration
    - "public/data/household.json"     # household-example series
  compute_source: policyengine-api-v1
  api_base: "https://api.policyengine.org"
  calibration_api_base: "https://calibration-diagnostics.vercel.app"
  reform_dict_file: "reform.json"      # canonical validated reform_dict (authoritative)
  time_period: 2026
  time_horizon: 1                      # single-year 2026 ONLY. Do NOT request a 10-year budget window.

  steps:
    # --- Economy-wide impact (impacts + headline metrics) --------------------
    - "POST {api_base}/us/policy  body={ data: <reform.json> }  -> reform_policy_id"
    - "baseline_policy_id = 2  # US current law (API default baseline)"
    - "GET {api_base}/us/economy/{reform_policy_id}/over/{baseline_policy_id}?region=us&time_period=2026 -> poll until status=='ok' -> impact.json"
    # --- Parameter table (policy explanation) --------------------------------
    # Current-law values are fetched from the API so they are authoritative,
    # never hardcoded; reform values + effective dates come from reform.json.
    - "For each of the 5 reform params: GET {api_base}/us/parameter/{param} -> current-law value at 2026 -> parameters.json"
    # --- Data calibration (validation) ---------------------------------------
    - "GET {calibration_api_base}/calibration/dashboard/api/populace/target-diagnostics?source=ssa -> validation.json.calibration"
    # --- Household examples (household page) ----------------------------------
    # Fast household endpoint; sweep other-income for archetypal senior households.
    - "For each example household x each income point: POST {api_base}/us/calculate (baseline) and /calculate with reform -> household.json"

  # Keys extracted from the economy `result` object into impact.json
  # (mirrors the existing trim() in scripts/precompute.py):
  extracted_metrics:
    budget:
      - budgetary_impact          # total federal revenue change (the single-year cost)
      - tax_revenue_impact
      - baseline_net_income
    decile:
      - relative                  # relative net-income change by income decile (1-10)
      - average                   # average $ net-income change by income decile (1-10)
    poverty:
      - poverty.all               # SPM poverty rate baseline vs reform (all people)
      - poverty.senior            # SPM poverty rate baseline vs reform (aged 65+)
      - poverty.child
      - poverty.adult
    intra_decile:
      - all                       # aggregate winner/loser shares
      - deciles                   # winner/loser shares per income decile (10 arrays)

  # Static reference values for the validation page (year-matched benchmarks).
  # PolicyEngine's own computed 2026 figure comes from impact.json; these are
  # the external/prior anchors it is compared against.
  benchmarks:
    - source: "CRFB"
      label: "Committee for a Responsible Federal Budget"
      metric: "First-year revenue loss"
      value: -94000000000
      approximate: true
      note: "~$94B first-year estimate."
    - source: "PolicyEngine (prior published)"
      label: "PolicyEngine prior single-year score"
      metric: "Single-year revenue loss"
      value: -98900000000
      year: 2025
      note: "$98.9B for 2025; NOT directly comparable to the 2026 figure shown here (different year, dataset version)."

  # Parameter table rows (derived verbatim from reform.json; current-law values
  # filled in at build time from the API). All five effective 2026-01-01.
  parameter_table:
    - parameter: "gov.irs.social_security.taxability.rate.base.excess"
      reform_value: 0
      effective: "2026-01-01"
    - parameter: "gov.irs.social_security.taxability.rate.base.benefit_cap"
      reform_value: 0
      effective: "2026-01-01"
    - parameter: "gov.irs.social_security.taxability.rate.additional.excess"
      reform_value: 0
      effective: "2026-01-01"
    - parameter: "gov.irs.social_security.taxability.rate.additional.benefit_cap"
      reform_value: 0
      effective: "2026-01-01"
    - parameter: "gov.irs.social_security.taxability.rate.additional.bracket"
      reform_value: 0
      effective: "2026-01-01"

tech_stack:
  framework: react-nextjs
  ui: "@policyengine/ui-kit"       # ^0.12.1 (installed)
  styling: tailwind-with-design-tokens
  font: inter
  testing: vitest
  charts: recharts

# ---------------------------------------------------------------------------
# Pages — four standard pages. Navigation via ui-kit Header nav items; routed
# with the Next.js App Router (app/page.tsx redirects to /policy or renders the
# explanation; app/impacts, app/validation, app/household).
# ---------------------------------------------------------------------------
pages:
  # (1) POLICY EXPLANATION -----------------------------------------------------
  - id: policy
    route: "/"
    title: "What HR 904 changes"
    purpose: >
      Plain-language, provision-by-provision explanation of HR 904 with links to
      the primary source and the parameter table derived from the reform JSON.
    components:
      - type: prose
        id: policy-explanation
        title: "The reform"
        content: >
          HR 904 eliminates federal income taxation of Social Security benefits.
          Under current law up to 85% of benefits are included in taxable income
          via the IRC 86 formula; HR 904 sets all five inclusion rates to zero, so
          no Social Security benefits are federally taxed. Explain each of the five
          rates (base excess/benefit_cap, additional excess/benefit_cap/bracket)
          in plain language.
      - type: link_list
        id: primary-sources
        title: "Primary sources"
        links:
          - label: "HR 904 on congress.gov"
            href: "https://www.congress.gov/bill/119th-congress/house-bill/904"
      - type: table
        id: parameter-table
        title: "Parameter changes"
        source: parameters.json
        columns:
          - { key: parameter, label: "Parameter" }
          - { key: current_law, label: "Current law (2026)", format: percent }
          - { key: reform_value, label: "HR 904", format: percent }
          - { key: effective, label: "Effective" }

  # (2) VALIDATION -------------------------------------------------------------
  - id: validation
    route: "/validation"
    title: "How we produced and checked these numbers"
    purpose: >
      PolicyEngine's result next to external benchmarks, model + data versions,
      the single-year methodology note, and the live data-calibration check for
      the reform's SSA domain.
    components:
      - type: comparison_table
        id: benchmark-comparison
        title: "First-year cost vs external estimates"
        source: [impact.json, validation.json]
        rows:
          - { label: "PolicyEngine (2026)", value_variable: "budget.budgetary_impact", format: currency }
          - { label: "CRFB (~$94B, first year)", value: -94000000000, format: currency }
          - { label: "PolicyEngine prior score (2025)", value: -98900000000, format: currency }
        note: >
          Estimates are single-year and year-specific; the 2025 prior score and
          the 2026 figure are not directly comparable.
      - type: metadata_card
        id: model-versions
        title: "Model and data versions"
        fields:
          - { label: "Data version", value_variable: "metadata.dataset" }
          - { label: "Analysis year", value_variable: "metadata.time_period" }
          - { label: "Baseline policy", value_variable: "metadata.baseline_policy_id" }
          - { label: "Reform policy", value_variable: "metadata.reform_policy_id" }
          - { label: "Generated at", value_variable: "metadata.generated_at" }
      - type: prose
        id: methodology-note
        title: "Methodology"
        content: >
          Static microsimulation (no behavioral response) on the certified
          PolicyEngine bundle dataset via the hosted PolicyEngine API. All
          budgetary figures are SINGLE-YEAR 2026 — do NOT extrapolate a naive
          ×10 for a ten-year total.
      - type: calibration_section
        id: data-calibration
        title: "Data calibration (SSA)"
        source: validation.json  # key: calibration
        calibration_source: ssa
        show:
          - release_id
          - targets_checked
          - share_within_tolerance
          - out_of_tolerance_targets   # any |relative error| > 10%, named explicitly
        link:
          label: "PolicyEngine calibration dashboard"
          href: "https://calibration-diagnostics.vercel.app"
        note: >
          Tells readers whether the underlying microdata is well-calibrated for
          Social Security benefits — the variable this reform acts on.

  # (3) IMPACTS ----------------------------------------------------------------
  - id: impacts
    route: "/impacts"
    title: "Economic impact of HR 904 (2026)"
    purpose: "Budgetary cost, poverty effects, and distribution of gains."
    components:
      # --- Headline metric cards ---
      - type: metric_card
        id: budgetary-cost
        component: "ui-kit MetricCard"
        title: "Annual federal cost (2026)"
        value_variable: budget.budgetary_impact   # rendered as abs() cost magnitude
        format: currency
        trend: neutral
        note: "Reduction in federal revenue, shown as a positive cost magnitude."
      - type: metric_card
        id: poverty-change-all
        component: "ui-kit MetricCard"
        title: "Change in overall poverty rate"
        value_variable: poverty.all   # (reform - baseline) / baseline
        format: percent
        invert_delta: true            # a decrease in poverty is favorable
      - type: metric_card
        id: poverty-change-senior
        component: "ui-kit MetricCard"
        title: "Change in senior poverty rate"
        value_variable: poverty.senior
        format: percent
        invert_delta: true
      # --- Canonical impact charts ---
      # ui-kit 0.12.1 does not ship dedicated IntraDecile/Decile/Poverty chart
      # components, so these use the canonical app-v2 pattern: ui-kit
      # ChartContainer wrapping recharts, styled to match policyengine.org
      # exactly (design tokens, snap125 ticks). Components already exist in
      # components/ from the prior build and are retained.
      - type: chart
        id: winners-losers-by-decile
        chart_type: stacked_bar
        component: "components/WinnersLosersByDecileChart (ui-kit ChartContainer + recharts)"
        component_ref: "app-v2:ChartContainer"
        title: "Winners and losers by income decile"
        x: { variable: income_decile, label: "Income decile", format: number }
        y:
          - { variable: "Gain more than 5%", label: "Gain more than 5%", color: chart-1 }
          - { variable: "Gain less than 5%", label: "Gain less than 5%", color: chart-2 }
          - { variable: "No change", label: "No change", color: border }
          - { variable: "Lose less than 5%", label: "Lose less than 5%", color: chart-5 }
          - { variable: "Lose more than 5%", label: "Lose more than 5%", color: destructive }
        source: intra_decile.deciles
      - type: chart
        id: avg-income-change-by-decile
        chart_type: bar
        component: "components/AvgIncomeChangeByDecileChart (ui-kit ChartContainer + recharts)"
        component_ref: "app-v2:ChartContainer"
        title: "Average change in household income by income decile"
        x: { variable: income_decile, label: "Income decile", format: number }
        y:
          - { variable: average_change, label: "Average change in net income", color: chart-1, format: currency }
        source: decile.average
      - type: chart
        id: poverty-by-age-group
        chart_type: grouped_bar
        component: "components/PovertyByAgeGroupChart (ui-kit ChartContainer + recharts)"
        component_ref: "app-v2:ChartContainer"
        title: "Poverty rate by age group, baseline vs reform"
        x: { variable: age_group, label: "Age group" }  # child, adult, senior, all
        y:
          - { variable: baseline_rate, label: "Baseline", color: chart-5, format: percent }
          - { variable: reform_rate, label: "Under HR 904", color: chart-1, format: percent }
        source: poverty

  # (4) HOUSEHOLD EXAMPLE ------------------------------------------------------
  - id: household
    route: "/household"
    title: "How HR 904 affects example households"
    purpose: >
      Standard household-example page. Precomputed net-income and federal-income-
      tax series for archetypal senior households under baseline vs HR 904, with a
      slider to pick the household's other (non-SS) taxable income.
    components:
      - type: input_form
        id: household-controls
        fields:
          - name: household_example
            input_type: select
            label: "Example household"
            options:
              - single_senior_20k_ss     # single filer, aged 67, $20k SS benefit
              - married_seniors_40k_ss   # married couple, aged 67, $40k combined SS benefit
          - name: other_income
            input_type: slider
            label: "Other taxable income (pension, wages, IRA)"
            min: 0
            max: 150000
            default: 30000
            step: 5000
        note: "Slider selects among precomputed points in household.json (no live compute)."
      - type: chart
        id: household-net-income
        chart_type: line
        component: "ui-kit ChartContainer + recharts"
        component_ref: "app-v2:ChartContainer"
        title: "Net income by other income, baseline vs HR 904"
        x: { variable: other_income, label: "Other taxable income", format: currency }
        y:
          - { variable: baseline_net_income, label: "Baseline", color: chart-5, format: currency }
          - { variable: reform_net_income, label: "Under HR 904", color: chart-1, format: currency }
        source: household.json
      - type: metric_card
        id: household-gain
        component: "ui-kit MetricCard"
        title: "Net income change at selected income"
        value_variable: "reform_net_income - baseline_net_income"
        format: currency
        trend: positive

embedding:
  register_in_apps_json: true
  display_with_research: true
  slug: "no-tax-on-social-security-dashboard"
  tags: ["us", "policy", "interactives", "social-security", "taxation"]

tests:
  api_tests:
    - name: "impact_json_shape"
      description: "precompute output impact.json has required top-level keys"
      input: { file: "public/data/impact.json" }
      expected_keys:
        - budget.budgetary_impact
        - decile.relative
        - decile.average
        - poverty.all
        - poverty.senior
        - intra_decile.deciles
        - metadata.dataset
    - name: "budgetary_cost_is_a_cost"
      description: "Eliminating SS taxation reduces federal revenue (negative impact)"
      input: { field: budget.budgetary_impact }
      expected: { max: 0, min: -200000000000 }   # cost under ~$200B/yr for 2026
    - name: "poverty_does_not_increase"
      description: "Overall and senior poverty rates should not rise under the reform"
      input: { fields: [poverty.all.reform, poverty.senior.reform] }
      expected: { senior_reform_le_baseline: true, all_reform_le_baseline: true }
    - name: "decile_arrays_length_10"
      description: "Decile and intra-decile breakdowns each cover 10 deciles"
      input: { fields: [decile.average, intra_decile.deciles] }
      expected: { length: 10 }
    - name: "parameters_json_five_rows"
      description: "Parameter table has all 5 reform parameters, each with a current-law value and reform value 0"
      input: { file: "public/data/parameters.json" }
      expected: { length: 5, reform_value_all: 0 }
    - name: "validation_calibration_present"
      description: "validation.json includes an ssa calibration block with release id and tolerance share"
      input: { file: "public/data/validation.json" }
      expected_keys: [calibration.release_id, calibration.share_within_tolerance]
    - name: "household_series_baseline_vs_reform"
      description: "household.json has, per example, arrays of baseline and reform net income where reform >= baseline"
      input: { file: "public/data/household.json" }
      expected: { reform_net_income_ge_baseline: true }

  frontend_tests:
    - name: "renders_without_errors"
      description: "All four pages mount successfully from precomputed JSON"
    - name: "charts_receive_data"
      description: "Each chart receives arrays of the expected length and shape"
    - name: "winners_losers_stack_to_100"
      description: "Each decile's winner/loser segments sum to ~100%"
    - name: "parameter_table_renders"
      description: "Policy page renders 5 parameter rows with current-law and reform columns"
    - name: "nav_between_pages"
      description: "Header nav links route between policy, validation, impacts, household"

  design_compliance:
    - name: "uses_design_tokens"
      description: "No hardcoded colors - fills use var(--chart-*)/var(--destructive)/var(--border)"
    - name: "inter_font"
      description: "Inter font loaded and applied via var(--font-sans)"
    - name: "sentence_case"
      description: "All headings and labels use sentence case (proper nouns preserved)"
    - name: "responsive"
      description: "Layout adapts at 768px and 480px breakpoints; charts shrink on mobile"
    - name: "nice_ticks"
      description: "All recharts axes use niceTicks=\"snap125\" with domain=[\"auto\",\"auto\"]"
    - name: "favicon"
      description: "ui-kit teal-square favicon present and referenced in layout metadata"

  embedding_tests:
    - name: "country_detection"
      description: "Reads country from #country= hash parameter (defaults to us)"
    - name: "share_urls"
      description: "Share URLs point to policyengine.org, not the Vercel domain"
